    <rect x="14" y="217.0" width="40" height="18" rx="4" fill="#412378" stroke="#A582E4" stroke-width="0.3" opacity="0.6"/>
    <text x="34.0" y="226.0" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="#A582E4">C</text>
    <text x="64" y="226.0" dominant-baseline="central" font-size="11.5" font-weight="400" fill="#A582E4">Stretch a MagiCAD cable tray.</text>
